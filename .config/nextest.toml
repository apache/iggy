[[profile.default.overrides]]
# This is a solution (or actually a workaround) for the problem that nextest does not support
# #[serial] macro which shall enforce sequential execution of the test case.
filter = 'package(integration) and test(cli::system::test_cli_session_scenario::should_be_successful)'
threads-required = "num-cpus"

# Doris tests are serialized among themselves, but no longer monopolize the
# whole runner. The all-in-one image's BE advertises 127.0.0.1:8040 for the
# FE→BE 307 redirect, so only one Doris container can bind host:8040 at a time.
# A `max-threads = 1` test-group enforces "one Doris test at a time" *across
# nextest's per-test processes* (an in-process Mutex can't, since each test is
# its own process) — which is what keeps the self-boot fallback safe — while
# letting unrelated light tests fill the rest of the runner.
#
# In CI a single shared container is started at the job level and its address
# exported via DORIS_FE_URL (see the rust pre-merge action), so these tests
# connect instead of booting; the serialization then just orders fast
# connect+load workloads rather than ~60-90s container boots.
[test-groups.doris]
max-threads = 1

[[profile.default.overrides]]
filter = 'package(integration) and test(/connectors::doris::/)'
test-group = "doris"
slow-timeout = { period = "60s", terminate-after = 8 }

[profile.default]
slow-timeout = { period = "30s", terminate-after = 4 }

[profile.ci]
retries = 3
