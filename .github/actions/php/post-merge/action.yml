name: php-post-merge
description: PHP post-merge GitHub release publishing with source-only PHP SDK archives

inputs:
  version:
    description: "Version for publishing"
    required: true
  tag:
    description: "Git tag that identifies this PHP SDK release"
    required: true
  commit:
    description: "Commit SHA being published"
    required: true
  dry_run:
    description: "Dry run mode"
    required: false
    default: "false"
  packages_artifact:
    description: "Name of the artifact containing PHP source release files"
    required: false
    default: "php-release-all"
  packages_path:
    description: "Path where PHP packages should be downloaded"
    required: false
    default: "dist"

runs:
  using: "composite"
  steps:
    - name: Validate version format
      run: |
        VERSION="${{ inputs.version }}"

        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
          echo "Invalid PHP SDK version format: $VERSION"
          echo "Expected Composer/Cargo-compatible SemVer: X.Y.Z[-prerelease][+build]"
          exit 1
        fi

        echo "Version format valid: $VERSION"
      shell: bash

    - name: Download PHP source package
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.packages_artifact }}
        path: ${{ inputs.packages_path }}

    - name: Validate downloaded PHP source package
      run: |
        set -euo pipefail

        PACKAGES_PATH="${{ inputs.packages_path }}"
        VERSION="${{ inputs.version }}"

        if [ ! -d "$PACKAGES_PATH" ]; then
          echo "PHP packages directory not found: $PACKAGES_PATH"
          exit 1
        fi

        expected=(
          "apache-iggy-php-${VERSION}-source.tar.gz"
          "apache-iggy-php-${VERSION}-LICENSE-binary.txt"
        )

        missing=0
        for filename in "${expected[@]}"; do
          if [ ! -f "$PACKAGES_PATH/$filename" ]; then
            echo "Missing expected package: $filename"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

        source_archive="$PACKAGES_PATH/apache-iggy-php-${VERSION}-source.tar.gz"
        echo "Validating PHP source archive contents:"
        members="$(tar -tzf "$source_archive")"
        for member in Cargo.toml composer.json LICENSE NOTICE src/lib.rs rust-toolchain.toml; do
          if ! grep -qx "apache-iggy-php-${VERSION}/${member}" <<< "$members"; then
            echo "Source archive is missing $member"
            exit 1
          fi
        done

        license_manifest="$PACKAGES_PATH/apache-iggy-php-${VERSION}-LICENSE-binary.txt"
        if [ ! -s "$license_manifest" ]; then
          echo "License manifest is empty: $(basename "$license_manifest")"
          exit 1
        fi

        echo ""
        echo "PHP release files ready for publishing:"
        find "$PACKAGES_PATH" -maxdepth 1 -type f -print | sort | while IFS= read -r file; do
          size="$(du -h "$file" | cut -f1)"
          echo "  - $(basename "$file") ($size)"
        done
      shell: bash

    - name: Display publishing information (dry run)
      if: inputs.dry_run == 'true'
      run: |
        PACKAGES_PATH="${{ inputs.packages_path }}"
        VERSION="${{ inputs.version }}"
        TAG="${{ inputs.tag }}"

        echo "DRY RUN - Would publish PHP SDK source package:"
        echo ""
        echo "Package: apache/iggy-php"
        echo "Version: $VERSION"
        echo "Tag: $TAG"
        echo "Registry: GitHub Releases"
        echo ""
        echo "Release assets that would be uploaded:"
        find "$PACKAGES_PATH" -maxdepth 1 -type f -print | sort | sed 's|.*/|  - |'
        echo ""
        echo "Packagist publishing requires a split repository with composer.json at the repository root."
      shell: bash

    - name: Publish GitHub release assets
      if: inputs.dry_run == 'false'
      run: |
        set -euo pipefail

        PACKAGES_PATH="${{ inputs.packages_path }}"
        VERSION="${{ inputs.version }}"
        TAG="${{ inputs.tag }}"
        COMMIT="${{ inputs.commit }}"

        if [ -z "$TAG" ]; then
          echo "PHP release tag input is empty"
          exit 1
        fi
        if ! git ls-remote --tags --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
          echo "PHP release tag $TAG does not exist on origin"
          echo "Create the annotated PHP SDK tag before publishing GitHub release assets."
          exit 1
        fi

        release_notes="$(mktemp)"
        trap 'rm -f "$release_notes"' EXIT
        {
          echo "Apache Iggy PHP SDK ${VERSION}"
          echo ""
          echo "This GitHub release contains the PHP SDK source package and generated license manifest."
          echo "The canonical Apache source release remains the ASF release artifact."
        } > "$release_notes"

        prerelease_flag=()
        if [ "$(scripts/extract-version.sh sdk-php --is-pre-release)" = "true" ]; then
          prerelease_flag=(--prerelease)
        fi

        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "GitHub release $TAG exists, uploading assets with clobber"
          gh release upload "$TAG" "$PACKAGES_PATH"/* --clobber
        else
          echo "Creating GitHub release $TAG"
          gh release create "$TAG" "$PACKAGES_PATH"/* \
            --target "$COMMIT" \
            --title "$TAG" \
            --notes-file "$release_notes" \
            "${prerelease_flag[@]}"
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
