name: _test
on:
  workflow_call:
    inputs:
      component:
        type: string
        required: true
        description: "Component to test"
      task:
        type: string
        required: true
        description: "Task to run"
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  run:
    # Select runner based on build target
    runs-on: ${{
      (inputs.task == 'build-aarch64-gnu' || inputs.task == 'build-aarch64-musl') && 'ubuntu-24.04-arm' ||
      inputs.task == 'build-macos-aarch64' && 'macos-14' ||
      inputs.task == 'build-windows-sdk' && 'windows-latest' ||
      'ubuntu-latest'
      }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip noop
        if: inputs.component == 'noop'
        run: echo "No changes detected, skipping tests"

      # Rust
      - name: Run Rust task
        if: startsWith(inputs.component, 'rust')
        uses: ./.github/actions/rust/pre-merge
        with:
          task: ${{ inputs.task }}
          component: ${{ inputs.component }}

      - name: Upload coverage to Codecov
        if: startsWith(inputs.component, 'rust') && startsWith(inputs.task, 'test-')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          flags: rust
          fail_ci_if_error: false
          verbose: true
          override_pr: ${{ github.event.pull_request.number }}

      # Python SDK
      - name: Set up Docker Buildx for Python
        if: inputs.component == 'sdk-python' && inputs.task == 'test'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Run Python SDK task
        if: inputs.component == 'sdk-python'
        uses: ./.github/actions/python-maturin/pre-merge
        with:
          task: ${{ inputs.task }}

      - name: Upload Python coverage to Codecov
        if: inputs.component == 'sdk-python' && inputs.task == 'test'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: reports/python-coverage.lcov
          disable_search: true
          flags: python
          fail_ci_if_error: false
          verbose: true
          override_pr: ${{ github.event.pull_request.number }}

      # Node SDK
      - name: Run Node SDK task
        if: inputs.component == 'sdk-node'
        uses: ./.github/actions/node-npm/pre-merge
        with:
          task: ${{ inputs.task }}

      - name: Upload Node coverage to Codecov
        if: inputs.component == 'sdk-node' && (inputs.task == 'test' || inputs.task == 'e2e')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: reports/node-coverage/${{ inputs.task == 'test' && 'unit' || 'e2e' }}/lcov.info
          disable_search: true
          flags: node
          fail_ci_if_error: false
          verbose: true
          override_pr: ${{ github.event.pull_request.number }}

      # Go SDK
      - name: Run Go SDK task
        if: inputs.component == 'sdk-go'
        uses: ./.github/actions/go/pre-merge
        with:
          task: ${{ inputs.task }}

      - name: Upload Go coverage to Codecov
        if: inputs.component == 'sdk-go' && (inputs.task == 'test' || inputs.task == 'e2e')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: reports/${{ inputs.task == 'test' && 'go-coverage.out' || 'go-coverage-e2e.out' }}
          disable_search: true
          flags: go
          fail_ci_if_error: false
          verbose: true
          override_pr: ${{ github.event.pull_request.number }}

      # Java SDK
      - name: Run Java SDK task
        if: inputs.component == 'sdk-java'
        uses: ./.github/actions/java-gradle/pre-merge
        with:
          task: ${{ inputs.task }}

      # C# SDK
      - name: Run C# SDK task
        if: inputs.component == 'sdk-csharp'
        uses: ./.github/actions/csharp-dotnet/pre-merge
        with:
          task: ${{ inputs.task }}

      # C++ SDK
      - name: Run C++ SDK Task
        if: inputs.component == 'sdk-cpp'
        uses: ./.github/actions/cpp-bazel/pre-merge
        with:
          task: ${{ inputs.task }}

      - name: Upload Java coverage to Codecov
        if: inputs.component == 'sdk-java' && inputs.task == 'test'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: reports/java-coverage/jacocoAggregated.xml
          disable_search: true
          flags: java
          fail_ci_if_error: false
          verbose: true
          override_pr: ${{ github.event.pull_request.number }}

      - name: Upload C# coverage to Codecov
        if: inputs.component == 'sdk-csharp' && (inputs.task == 'test' || inputs.task == 'e2e')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: foreign/csharp/reports/coverage.cobertura.xml
          disable_search: true
          flags: csharp
          fail_ci_if_error: false
          verbose: true
          override_pr: ${{ github.event.pull_request.number }}

      # Web UI
      - name: Run Web UI task
        if: inputs.component == 'web-ui'
        run: |
          cd web
          npm ci
          if [ "${{ inputs.task }}" = "lint" ]; then
            npm run lint
          elif [ "${{ inputs.task }}" = "build" ]; then
            npm run build
          fi

      # Helm chart validation
      - name: Install Helm
        if: inputs.component == 'helm' && inputs.task == 'validate'
        run: |
          HELM_VERSION="v4.1.3"
          HELM_CHECKSUM="02ce9722d541238f81459938b84cf47df2fdf1187493b4bfb2346754d82a4700"
          wget -qO /tmp/helm.tar.gz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          echo "${HELM_CHECKSUM}  /tmp/helm.tar.gz" | sha256sum -c -
          tar -zxf /tmp/helm.tar.gz -C /tmp linux-amd64/helm
          chmod +x /tmp/linux-amd64/helm
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm

      - name: Validate Helm chart
        if: inputs.component == 'helm' && inputs.task == 'validate'
        run: |
          set -euo pipefail

          chart=helm/charts/iggy
          out=/tmp/helm-render
          rm -rf "$out"
          mkdir -p "$out"

          helm lint --strict "$chart"

          helm template iggy "$chart" > "$out/default.yaml"
          test "$(grep -c '^kind: Deployment$' "$out/default.yaml")" -eq 2
          test "$(grep -c '^kind: Service$' "$out/default.yaml")" -eq 2
          test "$(grep -c '^kind: ServiceAccount$' "$out/default.yaml")" -eq 1
          test "$(grep -c '^kind: Secret$' "$out/default.yaml")" -eq 1
          # Intentionally pin current chart metadata and image tags so version
          # bumps require an explicit CI update instead of changing silently.
          grep -q 'helm.sh/chart: iggy-0.5.0' "$out/default.yaml"
          grep -q 'helm.sh/chart: iggy-ui-0.5.0' "$out/default.yaml"
          grep -q 'app.kubernetes.io/version: "0.7.0"' "$out/default.yaml"
          grep -q 'image: "apache/iggy:0.7.0"' "$out/default.yaml"
          grep -q 'image: "apache/iggy-web-ui:edge"' "$out/default.yaml"

          helm template iggy "$chart" \
            --set server.persistence.enabled=true \
            --set autoscaling.enabled=true \
            --set autoscaling.targetCPUUtilizationPercentage=80 \
            --set server.ingress.enabled=true \
            --set ui.ingress.enabled=true \
            --set server.serviceMonitor.enabled=true \
            > "$out/all-features.yaml"
          grep -q '^kind: PersistentVolumeClaim$' "$out/all-features.yaml"
          grep -q '^kind: HorizontalPodAutoscaler$' "$out/all-features.yaml"
          test "$(grep -c '^kind: Ingress$' "$out/all-features.yaml")" -eq 2
          grep -q '^kind: ServiceMonitor$' "$out/all-features.yaml"

          helm template iggy "$chart" \
            --kube-version 1.18.0 \
            --api-versions networking.k8s.io/v1beta1 \
            --api-versions autoscaling/v2beta2 \
            --set autoscaling.enabled=true \
            --set autoscaling.targetCPUUtilizationPercentage=80 \
            --set server.ingress.enabled=true \
            --set ui.ingress.enabled=true \
            > "$out/legacy-k8s-1.18.yaml"
          test "$(grep -c '^apiVersion: networking.k8s.io/v1beta1$' "$out/legacy-k8s-1.18.yaml")" -eq 2
          grep -q '^apiVersion: autoscaling/v2beta2$' "$out/legacy-k8s-1.18.yaml"

          helm template iggy "$chart" --set ui.enabled=false > "$out/server-only.yaml"
          test "$(grep -c '^kind: Deployment$' "$out/server-only.yaml")" -eq 1
          test "$(grep -c '^kind: Service$' "$out/server-only.yaml")" -eq 1

          helm template iggy "$chart" --set server.enabled=false > "$out/ui-only.yaml"
          test "$(grep -c '^kind: Deployment$' "$out/ui-only.yaml")" -eq 1
          test "$(grep -c '^kind: Service$' "$out/ui-only.yaml")" -eq 1

          helm template iggy "$chart" \
            --set server.users.root.createSecret=false \
            --set server.users.root.existingSecret.name=supersecret \
            > "$out/existing-secret.yaml"
          ! grep -q 'root-credentials' "$out/existing-secret.yaml"
          grep -q 'name: supersecret' "$out/existing-secret.yaml"

      # CI workflow validation
      - name: Validate CI workflows
        if: inputs.component == 'ci-workflows' && inputs.task == 'validate'
        run: |
          echo "Validating GitHub Actions workflows..."
          # Basic YAML validation
          for workflow in .github/workflows/*.yml; do
            echo "Checking $workflow"
            python -c "import yaml; yaml.safe_load(open('$workflow'))" || exit 1
          done
          echo "All workflows are valid YAML"

      # Upload reports
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.component }}-${{ inputs.task }}-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/**
            target/llvm-cov/**
            coverage.lcov
            codecov.json
          if-no-files-found: ignore
          retention-days: 7
