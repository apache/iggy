name: _build_php_extensions
on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: ""
      upload_artifacts:
        type: boolean
        required: false
        default: true
      use_latest_ci:
        type: boolean
        required: false
        default: true
        description: "Use latest CI configuration and scripts from master branch"
      commit:
        type: string
        required: false
        default: ""
        description: "Specific commit to checkout for building PHP extensions"
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact containing PHP extension archives"
        value: ${{ jobs.collect.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  license-manifest:
    name: Generate PHP binary license manifest
    runs-on: ubuntu-latest
    steps:
      - name: Download latest copy script from master
        if: inputs.use_latest_ci
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/copy-latest-from-master.sh" \
            -o /tmp/copy-latest-from-master.sh
          chmod +x /tmp/copy-latest-from-master.sh

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit }}

      - name: Save and apply latest CI from master
        if: inputs.use_latest_ci
        run: |
          /tmp/copy-latest-from-master.sh save .github scripts
          /tmp/copy-latest-from-master.sh apply

      - name: Install cargo-about
        run: |
          mkdir -p "$HOME/.cargo/bin"
          TARGET="$(uname -m)-unknown-linux-musl"
          curl -sSfL "https://github.com/EmbarkStudios/cargo-about/releases/download/0.9.0/cargo-about-0.9.0-${TARGET}.tar.gz" \
            | tar -xz -C "$HOME/.cargo/bin" --strip-components=1 "cargo-about-0.9.0-${TARGET}/cargo-about"

      - name: Generate third-party license manifest
        run: ./scripts/ci/third-party-licenses.sh --generate --manifest foreign/php/Cargo.toml --output foreign/php/LICENSE-binary

      - name: Upload license manifest
        uses: actions/upload-artifact@v7
        with:
          name: php-license-binary
          path: foreign/php/LICENSE-binary
          retention-days: 7

  linux:
    name: PHP ${{ matrix.php }} ${{ matrix.arch }} linux-${{ matrix.libc }}
    needs: license-manifest
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.3"
            arch: x86_64
            libc: glibc
            runner: ubuntu-latest
            image: php:8.3-cli-bookworm
          - php: "8.4"
            arch: x86_64
            libc: glibc
            runner: ubuntu-latest
            image: php:8.4-cli-bookworm
          - php: "8.3"
            arch: aarch64
            libc: glibc
            runner: ubuntu-24.04-arm
            image: php:8.3-cli-bookworm
          - php: "8.4"
            arch: aarch64
            libc: glibc
            runner: ubuntu-24.04-arm
            image: php:8.4-cli-bookworm
          - php: "8.3"
            arch: x86_64
            libc: musl
            runner: ubuntu-latest
            image: php:8.3-cli-alpine
          - php: "8.4"
            arch: x86_64
            libc: musl
            runner: ubuntu-latest
            image: php:8.4-cli-alpine
          - php: "8.3"
            arch: aarch64
            libc: musl
            runner: ubuntu-24.04-arm
            image: php:8.3-cli-alpine
          - php: "8.4"
            arch: aarch64
            libc: musl
            runner: ubuntu-24.04-arm
            image: php:8.4-cli-alpine
    steps:
      - name: Download latest copy script from master
        if: inputs.use_latest_ci
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/copy-latest-from-master.sh" \
            -o /tmp/copy-latest-from-master.sh
          chmod +x /tmp/copy-latest-from-master.sh

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit }}

      - name: Save and apply latest CI from master
        if: inputs.use_latest_ci
        run: |
          /tmp/copy-latest-from-master.sh save .github scripts
          /tmp/copy-latest-from-master.sh apply

      - name: Download license manifest
        uses: actions/download-artifact@v8
        with:
          name: php-license-binary
          path: foreign/php

      - name: Setup yq
        run: |
          if command -v yq >/dev/null 2>&1; then
            yq --version
            exit 0
          fi

          YQ_VERSION="v4.47.1"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  YQ_BINARY="yq_linux_amd64" ;;
            Linux-aarch64) YQ_BINARY="yq_linux_arm64" ;;
            Darwin-x86_64) YQ_BINARY="yq_darwin_amd64" ;;
            Darwin-arm64)  YQ_BINARY="yq_darwin_arm64" ;;
            *)
              echo "Unsupported yq platform: $(uname -s)-$(uname -m)"
              exit 1
              ;;
          esac

          yq_tmp="$(mktemp -d)"
          curl -sSL -o "${yq_tmp}/${YQ_BINARY}" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}"
          curl -sSL -o "${yq_tmp}/checksums" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$yq_tmp" && grep " ${YQ_BINARY}$" checksums | sha256sum -c -)
          else
            (cd "$yq_tmp" && grep " ${YQ_BINARY}$" checksums | shasum -a 256 -c -)
          fi

          mkdir -p "${RUNNER_TEMP}/yq-bin"
          chmod +x "${yq_tmp}/${YQ_BINARY}"
          mv "${yq_tmp}/${YQ_BINARY}" "${RUNNER_TEMP}/yq-bin/yq"
          echo "${RUNNER_TEMP}/yq-bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            chmod +x scripts/extract-version.sh
            version="$(scripts/extract-version.sh sdk-php)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and package PHP extension
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          PHP_VERSION: ${{ matrix.php }}
          PHP_ARCH: ${{ matrix.arch }}
          PHP_LIBC: ${{ matrix.libc }}
          PHP_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail

          mkdir -p foreign/php/dist

          docker run --rm \
            -e CARGO_TERM_COLOR=always \
            -e CARGO_TARGET_DIR=/workspace/target/php-release-${PHP_VERSION}-${PHP_ARCH}-${PHP_LIBC} \
            -e VERSION="${VERSION}" \
            -e PHP_VERSION="${PHP_VERSION}" \
            -e PHP_ARCH="${PHP_ARCH}" \
            -e PHP_LIBC="${PHP_LIBC}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${PHP_IMAGE}" \
            sh -lc '
              set -eu

              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                apt-get install -y --no-install-recommends \
                  build-essential \
                  ca-certificates \
                  clang \
                  curl \
                  git \
                  libclang-dev \
                  libhwloc-dev \
                  libssl-dev \
                  libudev-dev \
                  pkg-config \
                  zip
                rm -rf /var/lib/apt/lists/*
              else
                apk add --no-cache \
                  build-base \
                  ca-certificates \
                  clang \
                  clang-dev \
                  curl \
                  eudev-dev \
                  git \
                  hwloc-dev \
                  linux-headers \
                  openssl-dev \
                  pkgconf \
                  zip
              fi

              curl -sSf https://sh.rustup.rs -o /tmp/rustup-init.sh
              sh /tmp/rustup-init.sh -y --profile minimal --default-toolchain none
              . "$HOME/.cargo/env"
              rustup show

              php --version
              php-config --version
              cargo build --release --manifest-path foreign/php/Cargo.toml

              extension="$(find "${CARGO_TARGET_DIR}/release" -maxdepth 1 -name "libiggy_php.so" -print -quit)"
              if [ -z "$extension" ]; then
                echo "PHP extension was not produced"
                exit 1
              fi

              package_dir="$(mktemp -d)"
              cp "$extension" "$package_dir/iggy_php.so"
              cp foreign/php/LICENSE "$package_dir/LICENSE"
              cp foreign/php/NOTICE "$package_dir/NOTICE"
              cp foreign/php/LICENSE-binary "$package_dir/LICENSE-binary"

              archive="php_iggy_php-${VERSION}_php${PHP_VERSION}-${PHP_ARCH}-linux-${PHP_LIBC}-nts.zip"
              (cd "$package_dir" && zip -9 "/workspace/foreign/php/dist/${archive}" iggy_php.so LICENSE NOTICE LICENSE-binary)
              rm -rf "$package_dir"
            '

          ls -lh foreign/php/dist

      - name: Upload PHP extension archive
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: php-package-linux-${{ matrix.arch }}-${{ matrix.libc }}-php${{ matrix.php }}
          path: foreign/php/dist/*.zip
          retention-days: 7

  macos:
    name: PHP ${{ matrix.php }} ${{ matrix.arch }} macos
    needs: license-manifest
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.3"
            arch: x86_64
            runner: macos-15-intel
          - php: "8.4"
            arch: x86_64
            runner: macos-15-intel
          - php: "8.3"
            arch: aarch64
            runner: macos-15
          - php: "8.4"
            arch: aarch64
            runner: macos-15
    steps:
      - name: Download latest copy script from master
        if: inputs.use_latest_ci
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/copy-latest-from-master.sh" \
            -o /tmp/copy-latest-from-master.sh
          chmod +x /tmp/copy-latest-from-master.sh

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit }}

      - name: Save and apply latest CI from master
        if: inputs.use_latest_ci
        run: |
          /tmp/copy-latest-from-master.sh save .github scripts
          /tmp/copy-latest-from-master.sh apply

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none

      - name: Setup Rust with cache
        uses: ./.github/actions/utils/setup-rust-with-cache
        with:
          shared-key: php-release
          save-cache: "false"

      - name: Download license manifest
        uses: actions/download-artifact@v8
        with:
          name: php-license-binary
          path: foreign/php

      - name: Setup yq
        run: |
          if command -v yq >/dev/null 2>&1; then
            yq --version
            exit 0
          fi

          YQ_VERSION="v4.47.1"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  YQ_BINARY="yq_linux_amd64" ;;
            Linux-aarch64) YQ_BINARY="yq_linux_arm64" ;;
            Darwin-x86_64) YQ_BINARY="yq_darwin_amd64" ;;
            Darwin-arm64)  YQ_BINARY="yq_darwin_arm64" ;;
            *)
              echo "Unsupported yq platform: $(uname -s)-$(uname -m)"
              exit 1
              ;;
          esac

          yq_tmp="$(mktemp -d)"
          curl -sSL -o "${yq_tmp}/${YQ_BINARY}" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}"
          curl -sSL -o "${yq_tmp}/checksums" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$yq_tmp" && grep " ${YQ_BINARY}$" checksums | sha256sum -c -)
          else
            (cd "$yq_tmp" && grep " ${YQ_BINARY}$" checksums | shasum -a 256 -c -)
          fi

          mkdir -p "${RUNNER_TEMP}/yq-bin"
          chmod +x "${yq_tmp}/${YQ_BINARY}"
          mv "${yq_tmp}/${YQ_BINARY}" "${RUNNER_TEMP}/yq-bin/yq"
          echo "${RUNNER_TEMP}/yq-bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            chmod +x scripts/extract-version.sh
            version="$(scripts/extract-version.sh sdk-php)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and package PHP extension
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          PHP_VERSION: ${{ matrix.php }}
          PHP_ARCH: ${{ matrix.arch }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/php-release-${{ matrix.php }}-${{ matrix.arch }}-macos
        run: |
          set -euo pipefail

          php --version
          php-config --version
          cargo build --release --manifest-path foreign/php/Cargo.toml

          extension="$(find "${CARGO_TARGET_DIR}/release" -maxdepth 1 \( -name 'libiggy_php.so' -o -name 'libiggy_php.dylib' \) -print -quit)"
          if [ -z "$extension" ]; then
            echo "PHP extension was not produced"
            exit 1
          fi

          mkdir -p foreign/php/dist
          package_dir="$(mktemp -d)"
          cp "$extension" "$package_dir/iggy_php.so"
          cp foreign/php/LICENSE "$package_dir/LICENSE"
          cp foreign/php/NOTICE "$package_dir/NOTICE"
          cp foreign/php/LICENSE-binary "$package_dir/LICENSE-binary"

          archive="php_iggy_php-${VERSION}_php${PHP_VERSION}-${PHP_ARCH}-macos-bsdlibc-nts.zip"
          (cd "$package_dir" && zip -9 "${{ github.workspace }}/foreign/php/dist/${archive}" iggy_php.so LICENSE NOTICE LICENSE-binary)
          rm -rf "$package_dir"

          ls -lh foreign/php/dist

      - name: Upload PHP extension archive
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: php-package-macos-${{ matrix.arch }}-php${{ matrix.php }}
          path: foreign/php/dist/*.zip
          retention-days: 7

  source:
    name: Build PHP source archive
    runs-on: ubuntu-latest
    steps:
      - name: Download latest copy script from master
        if: inputs.use_latest_ci
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/copy-latest-from-master.sh" \
            -o /tmp/copy-latest-from-master.sh
          chmod +x /tmp/copy-latest-from-master.sh

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit }}

      - name: Save and apply latest CI from master
        if: inputs.use_latest_ci
        run: |
          /tmp/copy-latest-from-master.sh save .github scripts
          /tmp/copy-latest-from-master.sh apply

      - name: Setup yq
        run: |
          if command -v yq >/dev/null 2>&1; then
            yq --version
            exit 0
          fi

          YQ_VERSION="v4.47.1"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  YQ_BINARY="yq_linux_amd64" ;;
            Linux-aarch64) YQ_BINARY="yq_linux_arm64" ;;
            Darwin-x86_64) YQ_BINARY="yq_darwin_amd64" ;;
            Darwin-arm64)  YQ_BINARY="yq_darwin_arm64" ;;
            *)
              echo "Unsupported yq platform: $(uname -s)-$(uname -m)"
              exit 1
              ;;
          esac

          yq_tmp="$(mktemp -d)"
          curl -sSL -o "${yq_tmp}/${YQ_BINARY}" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}"
          curl -sSL -o "${yq_tmp}/checksums" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$yq_tmp" && grep " ${YQ_BINARY}$" checksums | sha256sum -c -)
          else
            (cd "$yq_tmp" && grep " ${YQ_BINARY}$" checksums | shasum -a 256 -c -)
          fi

          mkdir -p "${RUNNER_TEMP}/yq-bin"
          chmod +x "${yq_tmp}/${YQ_BINARY}"
          mv "${yq_tmp}/${YQ_BINARY}" "${RUNNER_TEMP}/yq-bin/yq"
          echo "${RUNNER_TEMP}/yq-bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            chmod +x scripts/extract-version.sh
            version="$(scripts/extract-version.sh sdk-php)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: |
          set -euo pipefail

          version="${{ steps.ver.outputs.version }}"
          mkdir -p foreign/php/dist
          git archive \
            --format=tar.gz \
            --prefix="apache-iggy-php-${version}/" \
            --output="foreign/php/dist/apache-iggy-php-${version}-source.tar.gz" \
            HEAD

          ls -lh foreign/php/dist

      - name: Upload PHP source archive
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: php-package-source
          path: foreign/php/dist/*.tar.gz
          retention-days: 7

  collect:
    name: Collect PHP packages
    needs: [linux, macos, source]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.output.outputs.artifact_name }}
    steps:
      - name: Download PHP packages
        uses: actions/download-artifact@v8
        with:
          pattern: php-package-*
          merge-multiple: true
          path: dist

      - name: List PHP packages
        run: |
          echo "## Built PHP packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Kind | File |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY

          while IFS= read -r package; do
            filename="$(basename "$package")"
            case "$filename" in
              *.zip) kind="PIE binary" ;;
              *.tar.gz) kind="Source" ;;
              *) kind="Other" ;;
            esac
            echo "| $kind | \`$filename\` |" >> $GITHUB_STEP_SUMMARY
          done < <(find dist -type f | sort)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total packages built:** $(find dist -type f | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-extensions-all
          path: dist
          retention-days: 30

      - id: output
        run: echo "artifact_name=php-extensions-all" >> "$GITHUB_OUTPUT"
