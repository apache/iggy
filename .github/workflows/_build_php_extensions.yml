name: _build_php_extensions
on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: ""
      upload_artifacts:
        type: boolean
        required: false
        default: true
      use_latest_ci:
        type: boolean
        required: false
        default: true
        description: "Use latest CI configuration and scripts from master branch"
      commit:
        type: string
        required: false
        default: ""
        description: "Specific commit to checkout for building PHP extension source"
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact containing PHP source release files"
        value: ${{ jobs.collect.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  license-manifest:
    name: Generate PHP license manifest
    runs-on: ubuntu-latest
    steps:
      - name: Download latest copy script from master
        if: inputs.use_latest_ci
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/copy-latest-from-master.sh" \
            -o /tmp/copy-latest-from-master.sh
          chmod +x /tmp/copy-latest-from-master.sh

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit }}

      - name: Save and apply latest CI from master
        if: inputs.use_latest_ci
        run: |
          /tmp/copy-latest-from-master.sh save .github scripts
          /tmp/copy-latest-from-master.sh apply

      - name: Install cargo-about
        run: |
          mkdir -p "$HOME/.cargo/bin"
          TARGET="$(uname -m)-unknown-linux-musl"
          curl -sSfL "https://github.com/EmbarkStudios/cargo-about/releases/download/0.9.0/cargo-about-0.9.0-${TARGET}.tar.gz" \
            | tar -xz -C "$HOME/.cargo/bin" --strip-components=1 "cargo-about-0.9.0-${TARGET}/cargo-about"

      - name: Generate third-party license manifest
        run: ./scripts/ci/third-party-licenses.sh --generate --manifest foreign/php/Cargo.toml --output foreign/php/LICENSE-binary

      - name: Upload license manifest
        uses: actions/upload-artifact@v7
        with:
          name: php-license-binary
          path: foreign/php/LICENSE-binary
          retention-days: 7

  source:
    name: Build PHP source package
    needs: license-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Download latest copy script from master
        if: inputs.use_latest_ci
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/copy-latest-from-master.sh" \
            -o /tmp/copy-latest-from-master.sh
          chmod +x /tmp/copy-latest-from-master.sh

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit }}

      - name: Save and apply latest CI from master
        if: inputs.use_latest_ci
        run: |
          /tmp/copy-latest-from-master.sh save .github scripts
          /tmp/copy-latest-from-master.sh apply

      - name: Setup PHP release tools
        id: release
        uses: ./.github/actions/php/setup-release-tools
        with:
          version: ${{ inputs.version }}

      - name: Download license manifest
        uses: actions/download-artifact@v8
        with:
          name: php-license-binary
          path: foreign/php

      - name: Build source package
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          mkdir -p foreign/php/dist
          git archive \
            --format=tar.gz \
            --prefix="apache-iggy-php-${version}/" \
            --output="foreign/php/dist/apache-iggy-php-${version}-source.tar.gz" \
            HEAD:foreign/php
          cp foreign/php/LICENSE-binary "foreign/php/dist/apache-iggy-php-${version}-LICENSE-binary.txt"

          ls -lh foreign/php/dist

      - name: Upload PHP source package
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: php-package-source
          path: foreign/php/dist/*
          retention-days: 7

  collect:
    name: Collect PHP source package
    needs: source
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.output.outputs.artifact_name }}
    steps:
      - name: Download PHP source package
        uses: actions/download-artifact@v8
        with:
          pattern: php-package-*
          merge-multiple: true
          path: dist

      - name: List PHP release files
        run: |
          {
            echo "## Built PHP release files"
            echo ""
            echo "| Kind | File |"
            echo "|------|------|"

            while IFS= read -r package; do
              filename="$(basename "$package")"
              case "$filename" in
                *.tar.gz) kind="Source" ;;
                *LICENSE-binary.txt) kind="License manifest" ;;
                *) kind="Other" ;;
              esac
              echo "| $kind | \`$filename\` |"
            done < <(find dist -type f | sort)

            echo ""
            echo "**Total files built:** $(find dist -type f | wc -l)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-release-all
          path: dist
          retention-days: 30

      - id: output
        run: echo "artifact_name=php-release-all" >> "$GITHUB_OUTPUT"
