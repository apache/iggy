# JDBC Sink Connector for PostgreSQL

type = "sink"
key = "jdbc_sink_pg"
enabled = true
version = 0
name = "JDBC PostgreSQL Sink"
path = "../../target/debug/libiggy_connector_jdbc_sink"

[[streams]]
stream = "test_stream"
topics = ["test_topic"]
schema = "json"

[plugin_config]
# All values are overridden at test time via environment variables.
jdbc_url = ""
driver_class = ""
driver_jar_path = ""
username = ""
password = ""
target_table = ""
auto_create_table = true
payload_format = "json"
batch_size = 100
include_metadata = true
include_checksum = true
include_origin_timestamp = true
enable_connection_pool = false
