# JDBC Source Connector for PostgreSQL

type = "source"
key = "jdbc_pg"
enabled = true
version = 0
name = "JDBC PostgreSQL Source"
path = "../../target/debug/libiggy_connector_jdbc_source"

[[streams]]
stream = "test_stream"
topic = "test_topic"
schema = "json"
partition_id = 1

[plugin_config]
# All required fields - values will be overridden by environment variables
# Use placeholder values that match the expected types
jdbc_url = ""
driver_class = ""
driver_jar_path = ""
username = ""
password = ""
query = ""
poll_interval = "1s"
batch_size = 100
mode = "bulk"
# Used only by incremental-mode tests; ignored in bulk mode.
tracking_column = "id"
initial_offset = "0"
snake_case_columns = false
include_metadata = true
