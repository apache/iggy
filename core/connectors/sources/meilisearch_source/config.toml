type = "source"
key = "meilisearch"
enabled = true
version = 0
name = "Meilisearch source"
path = "../../target/release/libiggy_connector_meilisearch_source"
plugin_config_format = "json"
verbose = false

[[streams]]
stream = "test_stream"
topic = "test_topic"
schema = "json"
batch_length = 100
linger_time = "5ms"

[plugin_config]
url = "http://localhost:7700"
index = "iggy_messages"
query = ""
# filter = "category = alpha"
# Nested array filters require JSON connector configuration. See README.md.
batch_size = 100
polling_interval = "5s"
include_metadata = true
timeout = "30s"
max_retries = 3
retry_delay = "500ms"
max_retry_delay = "5s"
max_open_retries = 5
