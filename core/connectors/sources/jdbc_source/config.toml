type = "source"
key = "jdbc"
enabled = true
version = 0
name = "JDBC source"
path = "../../target/release/libiggy_connector_jdbc_source"
verbose = false

[[streams]]
stream = "user_events"
topic = "users"
schema = "json"
batch_length = 100

[plugin_config]
jdbc_url = "jdbc:postgresql://localhost:5432/database"
driver_class = "org.postgresql.Driver"
driver_jar_path = "/tmp/jdbc-drivers/postgresql-42.7.1.jar"
username = "postgres"
password = "postgres"
query = "SELECT * FROM users WHERE id > {last_offset} ORDER BY id"
poll_interval = "1s"
batch_size = 1000
tracking_column = "id"
initial_offset = "0"
mode = "incremental"
snake_case_columns = false
include_metadata = true
enable_connection_pool = false
