type = "sink"
key = "jdbc"
enabled = true
version = 0
name = "JDBC sink"
path = "../../target/release/libiggy_connector_jdbc_sink"
verbose = false

[[streams]]
stream = "user_events"
topics = ["users", "orders"]
schema = "json"
batch_length = 100
poll_interval = "5ms"
consumer_group = "jdbc_sink"

[plugin_config]
jdbc_url = "jdbc:postgresql://localhost:5432/database"
driver_class = "org.postgresql.Driver"
driver_jar_path = "/tmp/jdbc-drivers/postgresql-42.7.1.jar"
username = "postgres"
password = "postgres"
target_table = "iggy_messages"
batch_size = 100
auto_create_table = true
include_metadata = true
include_checksum = true
include_origin_timestamp = true
payload_format = "json"
enable_connection_pool = false
