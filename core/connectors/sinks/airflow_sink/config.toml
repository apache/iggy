type = "sink"
key = "airflow"
enabled = true
version = 0
name = "Airflow trigger"
path = "../../target/release/libiggy_connector_airflow_sink"
verbose = false

[[streams]]
stream = "my_stream"
topics = ["my_topic"]
schema = "json"
batch_length = 50
poll_interval = "100ms"
consumer_group = "airflow_sink_group"

[plugin_config]
# Required — Airflow webserver base URL (no trailing slash required).
base_url = "http://localhost:8080"

# Required — default DAG to trigger. Override per message via dag_id_header when set.
dag_id = "example_dag"

# API path prefix (default: /api/v1). Use for Airflow version path differences.
api_prefix = "/api/v1"

# Auth: "none" | "basic" | "bearer" (default: none).
auth = "basic"
username = "admin"
password = "admin"
# token = "eyJ..."  # when auth = "bearer"

# Optional message header that overrides dag_id for a single trigger.
# dag_id_header = "airflow_dag_id"

# Put whole JSON payload into TriggerDAGRunPostBody.conf (default: payload).
conf_mode = "payload"

# Nest Iggy stream/topic/partition/offset under conf.iggy (default: false).
include_iggy_metadata_in_conf = false

# Health check on open (default: true). Path is relative to base_url.
health_check_enabled = true
health_path = "/api/v1/version"

# Retry configuration (max_retries = total attempts including first try).
timeout = "30s"
max_retries = 3
retry_delay = "1s"
retry_backoff_multiplier = 2
max_retry_delay = "30s"

# TLS — accept invalid certs (default: false). Use only for development.
tls_danger_accept_invalid_certs = false

# Connection pool — max idle connections per host (default: 10).
max_connections = 10

# Verbose request/response logging (default: false).
verbose_logging = false
