type = "sink"
key = "meilisearch"
enabled = true
version = 0
name = "Meilisearch sink"
path = "../../target/release/libiggy_connector_meilisearch_sink"
verbose = false

[[streams]]
stream = "test_stream"
topics = ["test_topic"]
schema = "json"
batch_length = 100
poll_interval = "5ms"
consumer_group = "meilisearch_sink"

[plugin_config]
url = "http://localhost:7700"
index = "iggy_messages"
primary_key = "iggy_id"
document_action = "replace"
create_index_if_not_exists = true
include_metadata = true
batch_size = 1000
timeout = "30s"
wait_for_tasks = true
