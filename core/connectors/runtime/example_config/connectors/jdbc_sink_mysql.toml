# Example JDBC Sink Connector Configuration for MySQL, with HikariCP pooling.

type = "sink"
key = "jdbc_sink_mysql_example"
enabled = true
version = 0
name = "JDBC MySQL Sink"
path = "target/release/libiggy_connector_jdbc_sink"
plugin_config_format = "toml"

[[streams]]
stream = "test"
topics = ["events"]
schema = "json"

[plugin_config]
jdbc_url = "jdbc:mysql://localhost:3306/mydb"
driver_class = "com.mysql.cj.jdbc.Driver"

# Download from: https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.3.0/mysql-connector-j-8.3.0.jar
driver_jar_path = "/tmp/jdbc-drivers/mysql-connector-j-8.3.0.jar"

username = "root"
password = "root"

target_table = "iggy_events"
auto_create_table = false

batch_size = 500
max_retries = 5
retry_delay = "2s"

payload_format = "text"
include_metadata = true
include_checksum = true
include_origin_timestamp = true

# HikariCP connection pool (requires HikariCP on the classpath alongside the
# MySQL driver JAR, or a shaded driver JAR that bundles it).
enable_connection_pool = true
max_pool_size = 20
min_idle = 5
connection_timeout_ms = 30000

# Extra JVM options
jvm_options = ["-Xmx512m"]
