type = "source"
key = "jdbc_h2_test"
enabled = true
version = 0
name = "JDBC H2 Test Source"
path = "target/release/libiggy_connector_jdbc_source"
plugin_config_format = "toml"

[plugin_config]
jdbc_url = "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;INIT=CREATE TABLE IF NOT EXISTS users (id INT PRIMARY KEY AUTO_INCREMENT, name VARCHAR(100), email VARCHAR(100), created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);INSERT INTO users (name, email) SELECT 'User ' || x, 'user' || x || '@test.com' FROM SYSTEM_RANGE(1, 100) WHERE NOT EXISTS (SELECT 1 FROM users);"
driver_class = "org.h2.Driver"
driver_jar_path = "/tmp/jdbc-drivers/h2-2.2.224.jar"
username = "sa"
password = ""
query = "SELECT * FROM users WHERE id > {last_offset} ORDER BY id"
poll_interval = "5s"
batch_size = 10
tracking_column = "id"
initial_offset = "0"
mode = "incremental"
snake_case_columns = true
include_metadata = true

[[streams]]
stream = "test"
topic = "users"
schema = "json"
