# Example JDBC Source Connector Configuration for Microsoft SQL Server

type = "source"
key = "jdbc_sqlserver_example"
enabled = true
version = 0
name = "JDBC SQL Server Source"
path = "target/release/libiggy_connector_jdbc_source"
plugin_config_format = "toml"

[plugin_config]
# JDBC connection URL
# Option 1: Separate credentials
jdbc_url = "jdbc:sqlserver://localhost:1433;databaseName=Sales;encrypt=false"

# Option 2: Embedded credentials in URL
# jdbc_url = "jdbc:sqlserver://localhost:1433;databaseName=Sales;user=sa;password=YourPassword123;encrypt=false"

# JDBC driver class name
driver_class = "com.microsoft.sqlserver.jdbc.SQLServerDriver"

# Path to JDBC driver JAR file
# Download from: https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/
driver_jar_path = "/opt/jdbc-drivers/mssql-jdbc-12.4.1.jre11.jar"

# Database credentials (optional if included in jdbc_url)
username = "sa"
password = "YourPassword123"

# SQL query to execute
query = "SELECT * FROM Orders WHERE OrderDate > {last_offset} ORDER BY OrderDate"

poll_interval = "15s"
batch_size = 2000
tracking_column = "OrderDate"
initial_offset = "2024-01-01"
mode = "incremental"

# Convert SQL Server naming to snake_case
snake_case_columns = true
include_metadata = true

# Connection pooling for high-throughput scenarios
enable_connection_pool = true
max_pool_size = 20
min_idle = 5
connection_timeout_ms = 30000

[[streams]]
stream = "sales"
topic = "orders"
partition_id = 1
schema = "json"
