# Example JDBC Source Connector Configuration for Oracle Database

type = "source"
key = "jdbc_oracle_example"
enabled = true
version = 0
name = "JDBC Oracle Source"
path = "target/release/libiggy_connector_jdbc_source"
plugin_config_format = "toml"

[plugin_config]
# JDBC connection URL
# Option 1: Separate credentials
jdbc_url = "jdbc:oracle:thin:@localhost:1521:XE"

# Option 2: Embedded credentials in URL (Oracle uses / separator)
# jdbc_url = "jdbc:oracle:thin:system/oracle@localhost:1521:XE"

# JDBC driver class name
driver_class = "oracle.jdbc.OracleDriver"

# Path to JDBC driver JAR file
# Download from: https://www.oracle.com/database/technologies/appdev/jdbc-downloads.html
driver_jar_path = "/opt/jdbc-drivers/ojdbc11.jar"

# Database credentials (optional if included in jdbc_url)
username = "system"
password = "oracle"

# SQL query to execute
# Oracle example with ROWNUM or use a numeric/timestamp column
query = "SELECT * FROM CUSTOMERS WHERE ID > {last_offset} ORDER BY ID"

# How often to poll the database
poll_interval = "1m"

# Maximum number of rows to fetch per poll
batch_size = 500

# Column to track for incremental reads (must be in query result)
tracking_column = "ID"

# Initial offset value for the first poll
initial_offset = "0"

# Source mode: "incremental" or "bulk"
# Works with ALL JDBC databases universally
mode = "incremental"

# Convert column names to snake_case (e.g., OrderDate -> order_date)
snake_case_columns = true

# Include metadata wrapper in output messages
include_metadata = true


# Custom JVM options (optional)
jvm_options = ["-Xmx512m", "-Xms256m"]

# Target Iggy stream and topic
[[streams]]
stream = "crm"
topic = "customers"
schema = "json"
