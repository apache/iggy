type = "sink"
key = "doris"
enabled = true
version = 0
name = "Doris sink"
path = "<BASE_DIR>/target/release/libiggy_connector_doris_sink"
plugin_config_format = "toml"
verbose = false

[[streams]]
stream = "events"
topics = ["doris_events"]
schema = "json"
batch_length = 100
poll_interval = "5ms"
consumer_group = "doris_sink"

[plugin_config]
fe_url = "http://localhost:8030"
database = "iggy_demo"
table = "events"
username = "root"
password = "replace_with_secret"
label_prefix = "iggy"
batch_size = 1000
timeout_secs = 30
